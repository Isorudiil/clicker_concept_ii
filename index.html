<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
        <link rel="stylesheet" href="./styles/style.css">
    </head>
    <body>
        <div class="assets-container">
            <div id="assets" class="assets-list hide"></div>
        </div>
        <div id="currency-container" class="currency-container">
            <button id="add-copper" data-currency="copper">
                Add copper <span id="copper-span"></span>
            </button>
            <button id="add-silver" data-currency="silver">
                Add silver <span id="silver-span"></span>
            </button>
            <button id="add-gold" data-currency="gold">
                Add gold <span id="gold-span"></span>
            </button>
            <button id="add-platinum" data-currency="platinum">
                Add platinum <span id="platinum-span"></span>
            </button>
            <button id="add-diamond" data-currency="diamond">
                Add diamond <span id="diamond-span"></span>
            </button>
        </div>

        <script type="module" src="scripts/controller.js"></script>
    </body>
</html>
