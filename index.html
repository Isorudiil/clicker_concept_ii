<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
        <link rel="stylesheet" href="./styles/style.css">
    </head>
    <body>
        <div class="assets-container normal-button">
            Inventory
            <div id="assets" class="assets-list hide"></div>
        </div>

        <div class="main-view-container">
            <div id="resource-container" class="resource-container">
                <button
                        id="add-trees"
                        data-resource="trees"
                        class="normal-button resource-button"
                >
                    Cut tree <span id="trees-span"></span>
                </button>
            </div>

            <div id="shop-container" class="shop-container">
                <button id="shop-button" class="normal-button shop-button">
                    Go to shop
                </button>
                <div id="shop-modal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            CCII Shop
                        </div>
                        <div class="modal-sub-header">
                            Buy and sell here
                        </div>
                        <div class="modal-body"></div>
                        <div class="modal-close normal-button">Close</div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="scripts/controller.js"></script>
    </body>
</html>
